services:
  - type: web
    name: astrova-backend
    env: docker
    dockerfilePath: ./BackEnd/ts-node-express/Dockerfile
    dockerContext: ./BackEnd/ts-node-express
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: production
      - key: NASA_API_KEY
        sync: false
      - key: NASA_BASE_URL
        value: https://api.nasa.gov/
      - key: EPIC_BASE_URL
        value: https://epic.gsfc.nasa.gov/
      - key: IMAGES_BASE_URL
        value: https://images-api.nasa.gov/
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://astrova.josegale.com
      - key: MONGODB_URI
        sync: false
